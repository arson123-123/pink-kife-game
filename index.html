<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arson 粉紅刀接刀 💗🔪 親親無限接刀大賽</title>
  <style>
    body { margin:0; height:100vh; background:#ffe6f2; display:flex; justify-content:center; align-items:center; font-family:Arial, sans-serif; }
    canvas { background:#fff0f5; border:4px solid #ff99cc; box-shadow:0 0 35px #ff69b4; touch-action:none; max-width:95vw; max-height:95vh; }
    #ui { position:absolute; top:15px; left:15px; color:#c2185b; font-size:32px; font-weight:bold; text-shadow:2px 2px 4px white; z-index:10; pointer-events:none; }
    #titleText { position:absolute; top:15px; right:15px; color:#c2185b; font-size:28px; font-weight:bold; text-shadow:2px 2px 4px white; z-index:10; pointer-events:none; }
    #startScreen, #gameOverScreen { position:absolute; inset:0; background:rgba(255,105,180,0.85); color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; font-size:48px; text-align:center; z-index:20; }
    button { margin:10px; padding:15px 50px; font-size:32px; background:#c2185b; color:white; border:none; border-radius:20px; cursor:pointer; }
    input { font-size:28px; padding:10px; width:70%; text-align:center; border-radius:15px; margin:10px; }
    #leaderboard { margin-top:20px; font-size:24px; text-align:left; max-width:85%; line-height:1.6; }
    #logoInStart { width:120px; height:120px; margin-bottom:20px; }
  </style>
</head>
<body>

<div id="ui">分數: <span id="score">0</span></div>
<div id="titleText">親親無限接刀大賽</div>

<div id="startScreen">
  <img id="logoInStart" src="https://i.imgur.com/kIqy3LI.jpeg" alt="孖人 logo">
  <div>Arson 粉紅刀接刀！</div>
  <div style="font-size:28px; margin:20px 0; max-width:80%;">手指/滑鼠拖動刀座接粉紅刀！<br>一接唔到就輸 + 愈黎愈快無限落！</div>
  <button onclick="startGame()">開始遊戲！🔪💗</button>
</div>

<div id="gameOverScreen" style="display:none;">
  <div>Game Over！</div>
  <div id="finalScore" style="font-size:42px; margin:10px 0;"></div>
  <input id="playerName" type="text" placeholder="輸入你的名字上榜" />
  <button onclick="submitScore()">上榜！</button>
  <button onclick="shareToFacebook()">分享到 Facebook</button>
  <button onclick="restartGame()">再玩一次</button>
  <div id="leaderboard">載入排行榜中...</div>
</div>

<canvas id="game" width="420" height="720"></canvas>

<script>
// Dreamlo 配置（已填入你的 code）
const privateCode = "hBiZyDUiqk28ndM-W0AogwdbX7sjPI-0qiCAj73qLwSA";
const publicCode  = "69b2d84b8f40bb1b149ee2a7";
const dreamloURL = "https://dreamlo.com/lb/";

// 遊戲變數
let score = 0;
let gameOver = false;
let gameStarted = false;

const holder = { x: 140, y: 540, width: 140, height: 180 };
let knives = [];
let knifeSpeed = 4.5;
let spawnRate = 90;
let frame = 0;
let acceleration = 0;

// 圖片
const knifeImg = new Image(); knifeImg.src = 'https://i.imgur.com/RqnGcmv.png';
const holderImg = new Image(); holderImg.src = 'https://i.imgur.com/Co4zydY.png';
const logoImg = new Image(); logoImg.src = 'https://i.imgur.com/kIqy3LI.jpeg';

let knifeLoaded = false, holderLoaded = false, logoLoaded = false;
knifeImg.onload = () => knifeLoaded = true;
holderImg.onload = () => holderLoaded = true;
logoImg.onload = () => logoLoaded = true;

// 畫刀、刀座、logo
function drawKnife(k) {
  if (knifeLoaded) {
    ctx.save();
    ctx.translate(k.x + 22, k.y + 14);
    ctx.drawImage(knifeImg, -knifeImg.width*0.0625, -knifeImg.height*0.0625, knifeImg.width*0.125, knifeImg.height*0.125);
    ctx.restore();
  } else {
    ctx.fillStyle = '#d3d3d3'; ctx.fillRect(k.x, k.y, 22, 5);
    ctx.fillStyle = '#ff99cc'; ctx.fillRect(k.x + 22, k.y - 2, 7, 7);
  }
}

function drawHolder() {
  if (holderLoaded) ctx.drawImage(holderImg, holder.x, holder.y, holder.width, holder.height);
}

function drawLogo() {
  if (logoLoaded) ctx.drawImage(logoImg, 20, 20, 110, 110);
}

function startGame() {
  startScreen.style.display = 'none';
  gameOver = false;
  score = 0;
  scoreEl.textContent = 0;
  knives = [];
  gameStarted = true;
  gameLoop();
}

function showGameOver() {
  gameOver = true;
  finalScoreEl.textContent = `你的分數: ${score}`;
  gameOverScreen.style.display = 'flex';
  loadLeaderboard();
}

// 上榜到 Dreamlo
async function submitScore() {
  const name = document.getElementById('playerName').value.trim() || "匿名玩家";
  const url = `${dreamloURL}${privateCode}/add/${encodeURIComponent(name)}/${score}`;

  try {
    const response = await fetch(url);
    if (response.ok) {
      alert("已上榜！全世界都見到你啦～");
    } else {
      alert("上榜失敗，請稍後再試");
    }
  } catch (err) {
    alert("網路問題：" + err);
  }
  restartGame();
}

// 分享到 Facebook
function shareToFacebook() {
  const text = `我喺親親無限接刀大賽拿到 ${score} 分！來挑戰我啦！🔪💗`;
  const gameUrl = "https://arson123-123.github.io/pink-kife-game/";
  const fbUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(gameUrl)}&quote=${encodeURIComponent(text)}`;
  window.open(fbUrl, '_blank');
}

// 載入排行榜
async function loadLeaderboard() {
  const url = `${dreamloURL}${publicCode}/json`;
  try {
    const response = await fetch(url);
    const data = await response.json();
    let html = '<strong>🌍 全球 Top 10</strong><br>';
    if (data && data.length > 0) {
      data.forEach((entry, i) => {
        html += `${i+1}. ${entry.name} - ${entry.score} 分<br>`;
      });
    } else {
      html += '暫無排行榜，成為第一名吧！';
    }
    leaderboardEl.innerHTML = html;
  } catch (err) {
    leaderboardEl.innerHTML = '載入排行榜失敗，請檢查網路';
  }
}

function restartGame() {
  gameOverScreen.style.display = 'none';
  startGame();
}

// 遊戲迴圈
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const finalScoreEl = document.getElementById('finalScore');
const leaderboardEl = document.getElementById('leaderboard');

function gameLoop() {
  if (!gameStarted || gameOver) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  const grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0, '#fff0f5'); grad.addColorStop(1, '#ffcce6');
  ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height);

  drawLogo();

  frame++;
  acceleration += 0.004;
  knifeSpeed = 4.5 + acceleration + (score * 0.12);
  spawnRate = Math.max(25, 90 - Math.floor(acceleration * 4) - Math.floor(score * 1.2));

  if (frame % spawnRate === 0) {
    const num = (score > 15 && Math.random() < 0.3) ? 2 : 1;
    for (let i = 0; i < num; i++) {
      knives.push({ x: Math.random() * (canvas.width - 60) + 10, y: -40 - i * 10 });
    }
  }

  for (let i = knives.length - 1; i >= 0; i--) {
    let k = knives[i];
    k.y += knifeSpeed;
    drawKnife(k);

    if (k.y + 28 > holder.y && k.y < holder.y + holder.height &&
        k.x + 38 > holder.x && k.x + 8 < holder.x + holder.width) {
      score++;
      scoreEl.textContent = score;
      knives.splice(i, 1);
      continue;
    }

    if (k.y > canvas.height + 50) {
      showGameOver();
    }
  }

  drawHolder();

  requestAnimationFrame(gameLoop);
}

// 控制
function moveHolder(clientX) {
  if (!gameStarted || gameOver) return;
  const rect = canvas.getBoundingClientRect();
  holder.x = clientX - rect.left - holder.width / 2;
  holder.x = Math.max(0, Math.min(canvas.width - holder.width, holder.x));
}

canvas.addEventListener('mousemove', e => moveHolder(e.clientX));
canvas.addEventListener('touchmove', e => { e.preventDefault(); moveHolder(e.touches[0].clientX); }, {passive: false});

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') holder.x -= 45;
  if (e.key === 'ArrowRight' || e.key === 'd') holder.x += 45;
  holder.x = Math.max(0, Math.min(canvas.width - holder.width, holder.x));
});
</script>
</body>
</html>
