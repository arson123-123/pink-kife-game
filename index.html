<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arson 粉紅刀接刀 💗🔪 親親無限接刀大賽</title>
  <style>
    body { margin:0; height:100vh; background:#ffe6f2; display:flex; justify-content:center; align-items:center; font-family:Arial, sans-serif; }
    canvas { background:#fff0f5; border:4px solid #ff99cc; box-shadow:0 0 35px #ff69b4; touch-action:none; max-width:95vw; max-height:95vh; }
    #ui { position:absolute; top:15px; left:15px; color:#c2185b; font-size:32px; font-weight:bold; text-shadow:2px 2px 4px white; z-index:10; pointer-events:none; }
    #titleText { position:absolute; top:15px; right:15px; color:#c2185b; font-size:28px; font-weight:bold; text-shadow:2px 2px 4px white; z-index:10; pointer-events:none; }
    #startScreen, #gameOverScreen { position:absolute; inset:0; background:rgba(255,105,180,0.85); color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; font-size:48px; text-align:center; z-index:20; }
    button { margin:10px; padding:15px 50px; font-size:32px; background:#c2185b; color:white; border:none; border-radius:20px; cursor:pointer; }
    #logoInStart { width:120px; height:120px; margin-bottom:20px; }
  </style>
</head>
<body>

<div id="ui">分數: <span id="score">0</span></div>
<div id="titleText">親親無限接刀大賽</div>

<div id="startScreen">
  <img id="logoInStart" src="https://i.imgur.com/kIqy3LI.jpeg" alt="孖人 logo">
  <div>Arson 粉紅刀接刀！</div>
  <div style="font-size:28px; margin:20px 0; max-width:80%;">手指/滑鼠拖動刀座接粉紅刀！<br>一接唔到就輸 + 愈黎愈快無限落！</div>
  <button onclick="startGame()">開始遊戲！🔪💗</button>
</div>

<div id="gameOverScreen" style="display:none;">
  <div>Game Over！</div>
  <div id="finalScore" style="font-size:42px; margin:10px 0;"></div>
  <button onclick="shareToFacebook()">分享到 Facebook</button>
  <button onclick="restartGame()">再玩一次</button>
</div>

<canvas id="game" width="420" height="720"></canvas>

<script>
// 遊戲變數
let score = 0;
let gameOver = false;
let gameStarted = false;

const holder = { x: 140, y: 540, width: 140, height: 180 };
let targetX = 140;
let velocity = 0;

let knives = [];
let knifeSpeed = 4.5;
let spawnRate = 90;
let frame = 0;
let acceleration = 0;

// 音效（Web Audio API）
let audioCtx;
function playDing() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  oscillator.type = 'sine';
  oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  oscillator.connect(gain);
  gain.connect(audioCtx.destination);
  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.3);
}

// 粒子
let particles = [];

// 圖片
const knifeImg = new Image(); knifeImg.src = 'https://i.imgur.com/RqnGcmv.png';
const holderImg = new Image(); holderImg.src = 'https://i.imgur.com/Co4zydY.png';
const logoImg = new Image(); logoImg.src = 'https://i.imgur.com/kIqy3LI.jpeg';

let knifeLoaded = false, holderLoaded = false, logoLoaded = false;
knifeImg.onload = () => knifeLoaded = true;
holderImg.onload = () => holderLoaded = true;
logoImg.onload = () => logoLoaded = true;

// 畫刀（搖擺 + 旋轉）
function drawKnife(k) {
  if (knifeLoaded) {
    ctx.save();
    ctx.translate(k.x + 22, k.y + 14);
    ctx.rotate(Math.sin(frame * 0.12 + k.x) * 0.12);
    ctx.drawImage(knifeImg, -knifeImg.width*0.0625, -knifeImg.height*0.0625, knifeImg.width*0.125, knifeImg.height*0.125);
    ctx.restore();
  } else {
    ctx.save();
    ctx.translate(k.x + 22, k.y + 14);
    ctx.rotate(Math.sin(frame * 0.12) * 0.12);
    ctx.fillStyle = '#d3d3d3'; ctx.fillRect(-11, -2.5, 22, 5);
    ctx.fillStyle = '#ff99cc'; ctx.fillRect(11, -5, 7, 7);
    ctx.restore();
  }
}

function drawHolder() {
  if (holderLoaded) ctx.drawImage(holderImg, holder.x, holder.y, holder.width, holder.height);
}

function drawLogo() {
  if (logoLoaded) ctx.drawImage(logoImg, 20, 20, 110, 110);
}

function startGame() {
  startScreen.style.display = 'none';
  gameOver = false;
  score = 0;
  scoreEl.textContent = 0;
  knives = [];
  particles = [];
  targetX = holder.x;
  velocity = 0;
  gameStarted = true;
  gameLoop();
}

function showGameOver() {
  gameOver = true;
  finalScoreEl.textContent = `你的分數: ${score}`;
  gameOverScreen.style.display = 'flex';
}

// 接住刀的特效（已大幅加強）
function catchEffect() {
  playDing();  // 音效

  // 大型金黃閃光圈（多層）
  ctx.save();
  ctx.globalAlpha = 0.8;
  const centerX = holder.x + 70;
  const centerY = holder.y + 90;
  ctx.fillStyle = '#ffff66';
  ctx.beginPath(); ctx.arc(centerX, centerY, 75, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffffaa';
  ctx.beginPath(); ctx.arc(centerX, centerY, 55, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // 更多粒子（星星 + 心心）
  for (let i = 0; i < 28; i++) {
    particles.push({
      x: centerX + (Math.random() - 0.5) * 80,
      y: centerY + (Math.random() - 0.5) * 40,
      vx: (Math.random() - 0.5) * 8,
      vy: -4 - Math.random() * 6,
      life: 35 + Math.random() * 20,
      color: Math.random() < 0.5 ? '#ffff66' : '#ff99cc',
      size: 5 + Math.random() * 4
    });
  }

  // +1 文字（向上飛）
  particles.push({
    x: centerX, y: centerY - 30,
    vx: 0, vy: -3,
    life: 50,
    text: '+1',
    color: '#ffff00'
  });

  // 刀座強震動
  holder.x += (Math.random() - 0.5) * 18;
}

function restartGame() {
  gameOverScreen.style.display = 'none';
  startGame();
}

// 遊戲迴圈
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const finalScoreEl = document.getElementById('finalScore');

function gameLoop() {
  if (!gameStarted || gameOver) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  const grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0, '#fff0f5'); grad.addColorStop(1, '#ffcce6');
  ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height);

  drawLogo();

  frame++;
  acceleration += 0.004;
  knifeSpeed = 4.5 + acceleration + (score * 0.12);
  spawnRate = Math.max(25, 90 - Math.floor(acceleration * 4) - Math.floor(score * 1.2));

  if (frame % spawnRate === 0) {
    const num = (score > 15 && Math.random() < 0.3) ? 2 : 1;
    for (let i = 0; i < num; i++) {
      knives.push({ x: Math.random() * (canvas.width - 60) + 10, y: -40 - i * 10 });
    }
  }

  for (let i = knives.length - 1; i >= 0; i--) {
    let k = knives[i];
    k.y += knifeSpeed;
    drawKnife(k);

    if (k.y + 28 > holder.y && k.y < holder.y + holder.height &&
        k.x + 38 > holder.x && k.x + 8 < holder.x + holder.width) {
      score++;
      scoreEl.textContent = score;
      knives.splice(i, 1);

      catchEffect();   // 加強特效 + 音效
      continue;
    }

    if (k.y > canvas.height + 50) {
      showGameOver();
    }
  }

  // 更新粒子
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.18;
    p.life--;
    if (p.life <= 0) { particles.splice(i, 1); continue; }

    ctx.save();
    ctx.globalAlpha = p.life / 35;
    ctx.fillStyle = p.color || '#ffff66';
    if (p.text) {
      ctx.font = 'bold 22px Arial';
      ctx.fillText(p.text, p.x, p.y);
    } else {
      ctx.fillRect(p.x, p.y, p.size || 5, p.size || 5);
    }
    ctx.restore();
  }

  // 刀座慣性（已調弱）
  const diff = targetX - holder.x;
  velocity += diff * 0.11;
  velocity *= 0.75;
  holder.x += velocity;
  holder.x = Math.max(0, Math.min(canvas.width - holder.width, holder.x));

  drawHolder();

  requestAnimationFrame(gameLoop);
}

// 控制
function moveHolder(clientX) {
  if (!gameStarted || gameOver) return;
  const rect = canvas.getBoundingClientRect();
  targetX = clientX - rect.left - holder.width / 2;
  targetX = Math.max(0, Math.min(canvas.width - holder.width, targetX));
}

canvas.addEventListener('mousemove', e => moveHolder(e.clientX));
canvas.addEventListener('touchmove', e => { e.preventDefault(); moveHolder(e.touches[0].clientX); }, {passive: false});

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') targetX -= 45;
  if (e.key === 'ArrowRight' || e.key === 'd') targetX += 45;
  targetX = Math.max(0, Math.min(canvas.width - holder.width, targetX));
});
</script>
</body>
</html>
